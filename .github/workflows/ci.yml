
# .github/workflows/ci.yml
name: CI — Pull Request Checks

on:
  pull_request:
    branches:
      - main

# Required for OIDC
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: app/backend
        run: npm install

      - name: Validate backend syntax
        working-directory: app/backend
        run: |
          node --check src/index.js
          echo "✅ Backend syntax valid"

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000

      - name: Verify build output
        run: |
          test -d app/frontend/dist
          echo "✅ Frontend build successful"

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install --legacy-peer-deps

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: app/backend
          push: false
          tags: taskmanager/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: app/frontend
          push: false
          tags: taskmanager/frontend:test
          build-args: |
            VITE_API_URL=http://localhost:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Images built successfully
        run: echo "✅ Both Docker images built successfully"

  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"    # ← change from 1.6.0 to 1.9.0

      - name: Terraform Init (main)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate (main)
        working-directory: terraform
        run: |
          terraform validate
          echo "✅ Terraform validate passed"